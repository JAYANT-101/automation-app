[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "automation-backend"
version = "0.1.0"
description = "Flask backend for the automation app."
readme = "../README.md"
requires-python = ">=3.11"
dependencies = [
    "DBcm>=3.0.5",
    "Flask>=3.1.3",
    "mariadb>=1.1.14",
    "openpyxl>=3.1.5",
    "pandas>=3.0.2",
    "python-dotenv>=1.2.2",
    "Werkzeug>=3.1.8",
]

[project.optional-dependencies]
dev = [
    "pytest>=9.0.3",
]

[tool.setuptools.packages.find]
include = ["web_app*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
