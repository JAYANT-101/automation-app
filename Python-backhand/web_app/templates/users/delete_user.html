{% extends 'base.html' %}

{% block header %}
  <h1>{% block title %}Log In{% endblock %}</h1>
{% endblock %}

{% block content %}
  <form method="post">
    <label for="username">Username</label>
    <input name="username" id="username" required>
    <input type="submit" value="submit">
  </form>
<table>
  <caption>Users_Table</caption>
  <thead>
    <tr>
      <th>Users</th>
    </tr>
  </thead>
  <tbody>
  {% for username in data %}
    <tr>
      <td>{{username}}</td>
    </tr>
  {% endfor %}
    </table>
{% endblock %}
